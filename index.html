<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="description" content="Responsive design testing for the masses">
	<title>Responsive Design Testing</title>
	<style>
		:root {
			--primary-color: #2563eb;
			--bg-color: #f8fafc;
			--card-bg: #ffffff;
			--text-main: #1e293b;
			--text-muted: #64748b;
			--border-color: #e2e8f0;
			--shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			vertical-align: top;
		}

		body {
			background-color: var(--bg-color);
			color: var(--text-main);
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			height: 100vh;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}

		#url {
			background: var(--card-bg);
			padding: 1.5rem 2rem;
			border-bottom: 1px solid var(--border-color);
			box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
			z-index: 10;
		}

		form {
			max-width: 1400px;
			margin: 0 auto;
			display: flex;
			gap: 1rem;
			align-items: center;
			flex-wrap: wrap;
		}

		.input-group {
			display: flex;
			gap: 0.5rem;
			align-items: center;
			flex: 1;
			min-width: 300px;
		}

		.add-group {
			display: flex;
			gap: 0.5rem;
			align-items: center;
			padding-left: 1rem;
			border-left: 1px solid var(--border-color);
		}

		#url input[type=text], #url input[type=number] {
			padding: 0.6rem 1rem;
			font-size: 0.95rem;
			border: 1px solid var(--border-color);
			border-radius: 0.4rem;
			outline: none;
			transition: all 0.2s;
			color: var(--text-main);
			background: #fff;
			flex: 1;
		}

		#url input[type=number] {
			width: 100px;
		}

		#url input[type=text]:focus, #url input[type=number]:focus {
			border-color: var(--primary-color);
			box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
		}

		#url input[type=submit], .btn-add {
			padding: 0.6rem 1.5rem;
			font-size: 0.95rem;
			font-weight: 600;
			color: #fff;
			background-color: var(--primary-color);
			border: none;
			border-radius: 0.4rem;
			cursor: pointer;
			transition: background-color 0.2s;
			white-space: nowrap;
		}

		#url input[type=submit]:hover, .btn-add:hover {
			background-color: #1d4ed8;
		}

		.btn-delete {
			background: none;
			border: none;
			color: #ef4444;
			cursor: pointer;
			padding: 4px;
			border-radius: 4px;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: background-color 0.2s;
		}

		.btn-delete:hover {
			background-color: #fee2e2;
		}

		.frame-actions {
			display: flex;
			align-items: center;
			gap: 0.25rem;
			margin-left: auto;
		}

		.btn-icon {
			background: none;
			border: none;
			color: var(--text-muted);
			cursor: pointer;
			padding: 4px;
			border-radius: 4px;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: background-color 0.2s, color 0.2s;
		}

		.btn-icon:hover {
			background-color: #e2e8f0;
			color: var(--text-main);
		}

		.btn-refresh:hover {
			color: var(--primary-color);
		}

		.btn-open-external:hover {
			color: #0f766e;
		}

		.btn-delete.btn-icon {
			color: #ef4444;
		}

		.btn-delete.btn-icon:hover {
			background-color: #fee2e2;
			color: #dc2626;
		}

		.btn-delete svg {
			width: 16px;
			height: 16px;
		}

		.btn-icon svg {
			width: 16px;
			height: 16px;
		}

		#frames {
			flex: 1;
			padding: 2rem;
			overflow-y: auto;
			display: flex;
			justify-content: center;
		}

		#inner {
			--frame-gap: 2rem;
			display: flex;
			flex-direction: column;
			gap: var(--frame-gap);
			width: 100%;
			max-width: 2200px;
			min-height: 100%;
			height: 100%;
			align-content: flex-start;
		}

		.frame-row {
			display: flex;
			gap: var(--frame-gap);
			justify-content: flex-start;
			width: 100%;
			height: 100%;
		}

		.frame {
			display: flex;
			flex-direction: column;
			background: var(--card-bg);
			border-radius: 0.75rem;
			border: 1px solid var(--border-color);
			box-shadow: var(--shadow);
			overflow: hidden;
			height: 100%;
			position: relative;
			transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
			min-width: 0;
		}

		.frame.is-dragging {
			opacity: 0.96;
			box-shadow: 0 18px 36px rgb(37 99 235 / 0.24);
			z-index: 20;
			transition: none;
		}

		.frame h2 {
			padding: 0.75rem 1rem;
			font-size: 0.875rem;
			font-weight: 600;
			color: var(--text-muted);
			background: #fafafa;
			border-bottom: 1px solid var(--border-color);
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 0.5rem;
			z-index: 2;
			cursor: grab;
			user-select: none;
			touch-action: none;
		}

		.frame-title {
			display: inline-flex;
			align-items: center;
			gap: 0.5rem;
			min-width: 0;
		}

		.drag-hint {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 1.7rem;
			height: 1.7rem;
			padding: 0;
			border-radius: 999px;
			background: #e2e8f0;
			color: #475569;
			transition: background-color 0.2s, color 0.2s, transform 0.2s;
			flex-shrink: 0;
		}

		.drag-handle {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			color: currentColor;
		}

		.drag-handle svg {
			width: 14px;
			height: 14px;
		}

		.frame.is-drag-ready h2,
		.frame.is-dragging h2 {
			cursor: grabbing;
			background: #eff6ff;
		}

		.frame h2:hover .drag-hint,
		.frame.is-drag-ready .drag-hint,
		.frame.is-dragging .drag-hint {
			background: #dbeafe;
			color: #1d4ed8;
		}

		.frame.is-drag-ready .drag-hint {
			transform: scale(1.03);
		}

		body.frame-dragging iframe {
			pointer-events: none;
		}

		.loader {
			border: 2px solid #f3f3f3;
			border-top: 2px solid var(--primary-color);
			border-radius: 50%;
			width: 14px;
			height: 14px;
			animation: spin 0.8s linear infinite;
			display: none;
		}

		@keyframes spin {
			0% { transform: rotate(0deg); }
			100% { transform: rotate(360deg); }
		}

		.iframe-container {
			flex: 1;
			position: relative;
			overflow: hidden;
			width: 100%;
		}

		iframe {
			border: none;
			background: #fff;
			transform-origin: 0 0;
			display: block;
			position: absolute;
			top: 0;
			left: 0;
		}

		#footer {
			padding: 1rem 2rem;
			background: var(--card-bg);
			border-top: 1px solid var(--border-color);
			font-size: 0.75rem;
			color: var(--text-muted);
			text-align: center;
		}

		#footer a {
			color: var(--primary-color);
			text-decoration: none;
		}

		#footer a:hover {
			text-decoration: underline;
		}
	</style>
</head>
